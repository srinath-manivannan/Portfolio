    <style>
      html { background: #050510; }

      #splash-loader {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        background: #050510;
        transition: opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1), visibility 0.6s;
      }
      #splash-loader.fade-out { opacity: 0; visibility: hidden; }

      .splash-brand {
        font-family: 'Space Grotesk', system-ui, sans-serif;
        font-weight: 700;
        font-size: 1.5rem;
        letter-spacing: -0.03em;
        background: linear-gradient(135deg, #3b82f6, #8b5cf6, #eab308);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 2rem;
        opacity: 0;
        animation: splash-fade-in 0.6s ease forwards 0.1s;
      }

      .splash-bar-track {
        width: 200px;
        height: 2px;
        background: rgba(255,255,255,0.06);
        border-radius: 2px;
        overflow: hidden;
        opacity: 0;
        animation: splash-fade-in 0.4s ease forwards 0.3s;
      }
      .splash-bar-fill {
        height: 100%;
        width: 0%;
        border-radius: 2px;
        background: linear-gradient(90deg, #3b82f6, #8b5cf6);
        animation: splash-progress 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards 0.4s;
      }

      .splash-subtitle {
        font-family: 'Inter', system-ui, sans-serif;
        font-size: 0.7rem;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: rgba(255,255,255,0.25);
        margin-top: 1rem;
        opacity: 0;
        animation: splash-fade-in 0.4s ease forwards 0.5s;
      }

      @keyframes splash-fade-in {
        to { opacity: 1; }
      }
      @keyframes splash-progress {
        to { width: 100%; }
      }
    </style>
  </head>

  <body>
    <div id="splash-loader" aria-label="Loading portfolio">
      <div class="splash-brand">SM</div>
      <div class="splash-bar-track"><div class="splash-bar-fill"></div></div>
      <div class="splash-subtitle">Loading Experience</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      window.addEventListener('load', () => {
        setTimeout(() => {
          const s = document.getElementById('splash-loader');
          if (s) { s.classList.add('fade-out'); setTimeout(() => s.remove(), 700); }
        }, 800);
      });
    </script>
  </body>
